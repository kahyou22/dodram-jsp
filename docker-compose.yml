services:
  # ── Nginx (리버스 프록시) ─────────────────────────
  nginx:
    image: nginx:alpine
    container_name: dodram-nginx
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - tomcat
    restart: unless-stopped

  # ── Tomcat (애플리케이션) ─────────────────────────
  tomcat:
    build: .
    container_name: dodram-tomcat
    environment:
      - JDBC_URL=jdbc:mysql://mysql:3306/${DB_NAME}?serverTimezone=UTC&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true
      - JDBC_USERNAME=${DB_USER}
      - JDBC_PASSWORD=${DB_PASSWORD}
    expose:
      - "8080"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  # ── MySQL ────────────────────────────────────────
  mysql:
    image: mysql:8
    container_name: dodram-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    expose:
      - "3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── phpMyAdmin ───────────────────────────────────
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: dodram-phpmyadmin
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
    ports:
      - "8081:80"
    depends_on:
      - mysql
    restart: unless-stopped

volumes:
  mysql_data:
